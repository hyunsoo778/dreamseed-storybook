<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#101b3d">
  <title>꿈씨앗 짧은 동화</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gowun+Dodum&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../style.css">
  <style>
    .short-page .scene-image { transition: transform 8s ease; }
    .short-page.active .scene-image { transform: scale(1.06); }
    .short-page:nth-of-type(even) .scene-image { object-position: 72% center; }
    .ending-icon { margin: 10px 0; font-size: 4.7rem; }
    .book-error {
      display: none; place-content: center; height: 100%; padding: 30px;
      color: #25304f; background: #fffdf5; text-align: center;
    }
  </style>
  <!-- AdSense ready: adsense-config.js에서 실제 ca-pub ID로 교체 후 enabled=true -->
  <link rel="stylesheet" href="../../../adsense.css">
  <script src="../../../adsense-config.js" defer></script>
  <script src="../../../adsense-loader.js" defer></script>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <header class="topbar">
    <a class="brand" href="../../index.html"><span class="brand-mark">✦</span><span>꿈씨앗 책방</span></a>
    <button class="sound-button" id="soundButton" type="button" aria-pressed="false">
      <span class="sound-icon">♪</span><span class="sound-label">소리 켜기</span>
    </button>
  </header>
  <main>
    <section class="book-shell">
      <div class="book" id="book">
        <div class="book-error" id="bookError">
          <div><h2>동화를 찾지 못했어요.</h2><a href="../../index.html">책장으로 돌아가기</a></div>
        </div>
      </div>
      <nav class="book-controls" aria-label="책 페이지 이동">
        <button class="nav-button prev" type="button" aria-label="이전 페이지">←</button>
        <div class="progress-wrap">
          <div class="progress-track"><span id="progressBar"></span></div>
          <p><strong id="currentPage">표지</strong><span> / 6</span></p>
        </div>
        <button class="nav-button next" type="button" aria-label="다음 페이지">→</button>
      </nav>
    </section>
  </main>

  <aside class="ad-wrap ad-wrap-bottom" aria-label="광고" data-ad-slot-placeholder data-slot-name="storyBottom"></aside>

  <footer><p id="footerMessage">오늘도 마음에 작은 씨앗 하나를 심어요.</p><span>꿈씨앗 책방의 짧은 이야기</span></footer>
  <script src="stories.js"></script>
  <script src="reader.js"></script>
